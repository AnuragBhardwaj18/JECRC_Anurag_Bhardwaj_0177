
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart Total</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: center;
}
button{
    padding: 10px 20px;
    border: none;
    background-color: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background-color: #0056b3;
}
.result{
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>Shopping Cart Total</h2>
    <p>Click the button to calculate total cart value.</p>

    <button onclick="calculateTotal()">Calculate Total</button>

    <div class="result" id="output"></div>
</div>

<script>
function calculateTotal(){

    const cart = [500, 1200, 800, 1500];

    const total = cart.reduce((sum, price) => sum + price, 0);

    document.getElementById("output").innerHTML =
        "Total Cart Value: ₹" + total;
}
</script>

</body>
</html>
