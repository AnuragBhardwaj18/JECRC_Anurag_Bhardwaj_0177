
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Commerce Price Update</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    background: #ffffff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
button{
    padding: 10px 20px;
    border: none;
    background-color: #28a745;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background-color: #218838;
}
.result{
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>E-Commerce Price Update</h2>
    <p>Click the button to apply 10% discount on all products.</p>

    <button onclick="updatePrices()">Apply Discount</button>

    <div class="result" id="output"></div>
</div>

<script>
function updatePrices(){

    const prices = [1200, 800, 1500, 2000];

    const discountedPrices = prices.map(price => price * 0.9);

    document.getElementById("output").innerHTML =
        "Discounted Prices: [" + discountedPrices.join(", ") + "]";
}
</script>

</body>
</html>
