
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pass Students Only</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
button{
    padding: 10px 20px;
    border: none;
    background-color: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background-color: #0056b3;
}
.result{
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>Pass Students Only</h2>
    <p>Click the button to show students who scored above 50.</p>

    <button onclick="showPassStudents()">Show Passing Marks</button>

    <div class="result" id="output"></div>
</div>

<script>
function showPassStudents(){

    const marks = [35, 67, 48, 90, 55, 30];

    const passStudents = marks.filter(mark => mark > 50);

    document.getElementById("output").innerHTML =
        "Passing Marks: [" + passStudents.join(", ") + "]";
}
</script>

</body>
</html>
