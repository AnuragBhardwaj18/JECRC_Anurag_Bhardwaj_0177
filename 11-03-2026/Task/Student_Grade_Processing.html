
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Grade Processing</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}
h2{
    margin-bottom: 15px;
}
button{
    padding: 10px 20px;
    border: none;
    background-color: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background-color: #0056b3;
}
.result{
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>Student Grade Processing</h2>
    <p>Click the button to add 5 bonus marks.</p>

    <button onclick="processMarks()">Add Bonus Marks</button>

    <div class="result" id="output"></div>
</div>

<script>
function processMarks(){

    const marks = [65, 70, 80, 55, 90];

    const updatedMarks = marks.map(mark => mark + 5);

    document.getElementById("output").innerHTML =
        "Updated Marks: [" + updatedMarks.join(", ") + "]";
}
</script>

</body>
</html>
