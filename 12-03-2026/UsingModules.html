<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Using Modules in JavaScript</title>

<style>
body{
font-family: Arial;
padding:40px;
}

h2{
margin-top:40px;
}

.container{
display:flex;
gap:40px;
}

.box{
border:1px solid #ccc;
padding:20px;
width:300px;
border-radius:8px;
}

button{
margin-top:10px;
padding:6px 12px;
}

.result{
margin-top:10px;
font-weight:bold;
color:blue;
}
</style>

</head>
<body>

<h1>Using Modules in JavaScript</h1>

<div class="container">

<!-- Project 1 -->
<div class="box">
<h2>Project 1 (Without Modules)</h2>

<label>Email</label><br>
<input type="text" id="email1" placeholder="Enter email">

<br>
<button onclick="checkEmail1()">Validate Email</button>

<div class="result" id="result1"></div>
</div>


<!-- Project 2 -->
<div class="box">
<h2>Project 2 (Duplicate Code)</h2>

<label>Email</label><br>
<input type="text" id="email2" placeholder="Enter email">

<br>
<button onclick="checkEmail2()">Validate Email</button>

<div class="result" id="result2"></div>
</div>


<!-- Project 3 -->
<div class="box">
<h2>Project 3 (Using Module)</h2>

<label>Date</label><br>
<input type="text" id="date3" readonly>

<br><br>

<label>Email</label><br>
<input type="text" id="email3" placeholder="Enter email">

<br>
<button onclick="checkEmail3()">Validate Email</button>

<div class="result" id="result3"></div>
</div>

<!-- Project 4 -->
<div class="box">
<h2>Project 4 (Using Shared Module)</h2>

<p>Today's Date: <span id="date4"></span></p>

<label>Email</label><br>
<input type="text" id="email4" placeholder="Enter email">

<br>
<button onclick="checkEmail4()">Validate Email</button>

<div class="result" id="result4"></div>
</div>

</div>


<script>

// Before using modules Project 1
function formatDate(date) {
    return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
}

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function checkEmail1(){
    const email = document.getElementById('email1').value;
    const result = validateEmail(email) ? 'Valid Email' : 'Invalid Email';
    document.getElementById('result1').innerText = result;
}

// Before using modules Project 2 (Duplicate code)
function formatDate2(date) {
    return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
}

function validateEmail2(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function checkEmail2(){
    const email = document.getElementById('email2').value;
    const result = validateEmail2(email) ? 'Valid Email' : 'Invalid Email';
    document.getElementById('result2').innerText = result;
}

// After using modules
const Utils = {
    formatDate(date) {
        return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
    },
    validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
};

document.getElementById("date3").value = Utils.formatDate(new Date());

function checkEmail3(){
    const email = document.getElementById('email3').value;
    const result = Utils.validateEmail(email) ? 'Valid Email' : 'Invalid Email';
    document.getElementById('result3').innerText = result;
}

document.getElementById("date4").innerText = Utils.formatDate(new Date());

function checkEmail4(){
    const email = document.getElementById('email4').value;
    const result = Utils.validateEmail(email) ? 'Valid Email' : 'Invalid Email';
    document.getElementById('result4').innerText = result;
}
</script>

</body>
</html>
