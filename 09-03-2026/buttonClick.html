<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Click Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding: 12px 25px;
    font-size: 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    opacity: 0.9;
}
</style>

</head>

<body>

<h2>Login Example</h2>

<button id="loginBtn">Login</button>

<script>

/* Button Click Event using Arrow Function */
document.getElementById("loginBtn").addEventListener("click", (e) => {

    console.log("Login button clicked");

    alert("Login process started");

});

</script>

</body>
</html>
