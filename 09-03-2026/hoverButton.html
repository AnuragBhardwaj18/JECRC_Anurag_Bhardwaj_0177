<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Hover Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding: 12px 25px;
    font-size: 16px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    opacity: 0.9;
}
</style>

</head>

<body>

<h2>Hover Event Example</h2>

<button id="submitBtn">Submit</button>

<p id="message"></p>

<script>

/* Mouse Hover Event using Arrow Function */
document.getElementById("submitBtn").addEventListener("mouseover", () => {

    console.log("Mouse hovered over submit button");

    document.getElementById("message").textContent = "Mouse hovered over submit button";

});

</script>

</body>
</html>
