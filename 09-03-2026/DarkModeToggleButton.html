<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 100px;
    background: white;
    color: black;
}

/* Dark Mode Style */
.dark{
    background: black;
    color: white;
}

button{
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>Dark Mode Toggle Example</h1>

<button id="darkMode">Toggle Dark Mode</button>

<script>

/* Arrow Function for Dark Mode Toggle */
document.getElementById("darkMode").addEventListener("click", () => {

    document.body.classList.toggle("dark");

});

</script>

</body>
</html>
